```html
<!DOCTYPE html>
<html>

<head>
<title>Face Me</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
text-align:center;
font-size:40px;
padding:20px;
}

.container{
display:flex;
height:90vh;
}

.menu{
width:230px;
background:#1c1c1c;
padding-top:20px;
text-align:center;
}

.menu button{
display:block;
width:85%;
margin:10px auto;
padding:12px;
border:none;
background:#00bfff;
color:white;
border-radius:8px;
cursor:pointer;
}

.menu button:disabled{
background:#555;
}

.content{
flex:1;
padding:40px;
overflow-y:auto;
}

.hidden{
display:none;
}

.profilePic{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
position:absolute;
top:20px;
left:20px;
border:2px solid white;
}

input, textarea, select{
padding:10px;
margin:10px;
width:250px;
}

textarea{
height:90px;
}

ul{
list-style:none;
padding-left:0;
}

.card{
background:#1e1e1e;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

</style>
</head>

<body>

<header>FACE ME</header>

<img id="displayPic" class="profilePic">

<div class="container">

<div class="menu">

<button onclick="showPage('loginPage')">Login</button>
<button onclick="showPage('profilePage')">Create Profile</button>

<button id="habitsBtn" disabled onclick="showPage('habitsPage')">Habits</button>
<button id="journalBtn" disabled onclick="showPage('journalPage')">Journal</button>
<button id="traitsBtn" disabled onclick="showPage('traitsPage')">Character</button>
<button id="reminderBtn" disabled onclick="showPage('reminderPage')">Reminder</button>
<button id="moodBtn" disabled onclick="showPage('moodPage')">Mood</button>

<button onclick="showPage('homePage')">Dashboard</button>

</div>

<div class="content">

<!-- DASHBOARD -->

<div id="homePage" class="hidden">

<h2 id="welcomeMsg"></h2>

<div class="card">
<h3>Statistics</h3>
<p id="habitStat"></p>
<p id="journalStat"></p>
<p id="moodStat"></p>
</div>

</div>


<!-- LOGIN -->

<div id="loginPage">

<h2>Login</h2>

<input id="email" placeholder="Email"><br>
<input id="password" type="password" placeholder="Password"><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Log In</button>

</div>


<!-- PROFILE -->

<div id="profilePage" class="hidden">

<h2>Create Profile</h2>

<input id="username" placeholder="Username"><br>

<input type="file" id="profilePicInput"><br>

<button onclick="createProfile()">Create Profile</button>

</div>


<!-- HABITS -->

<div id="habitsPage" class="hidden">

<h2>Habit Tracker</h2>

<input id="habitInput" placeholder="New Habit">

<button onclick="addHabit()">Add Habit</button>

<ul id="habitList"></ul>

</div>


<!-- JOURNAL -->

<div id="journalPage" class="hidden">

<h2>Journal</h2>

<textarea id="journalText" placeholder="Write today's thoughts"></textarea>

<br>

<button onclick="saveJournal()">Save Entry</button>

<ul id="journalList"></ul>

</div>


<!-- CHARACTER TRAITS -->

<div id="traitsPage" class="hidden">

<h2>Character Traits</h2>

<input id="traitInput" placeholder="Trait">

<select id="traitType">
<option value="good">Good</option>
<option value="bad">Bad</option>
</select>

<button onclick="addTrait()">Add Trait</button>

<h3>Good Traits</h3>
<ul id="goodTraits"></ul>

<h3>Bad Traits</h3>
<ul id="badTraits"></ul>

</div>


<!-- REMINDERS -->

<div id="reminderPage" class="hidden">

<h2>Reminders</h2>

<input id="reminderInput" placeholder="Reminder">

<button onclick="addReminder()">Add</button>

<ul id="reminderList"></ul>

</div>


<!-- MOOD -->

<div id="moodPage" class="hidden">

<h2>Mood Tracker</h2>

<select id="moodSelect">
<option>Happy</option>
<option>Neutral</option>
<option>Sad</option>
<option>Angry</option>
</select>

<button onclick="saveMood()">Save Mood</button>

<ul id="moodList"></ul>

</div>


</div>
</div>


<script>

/* PAGE NAVIGATION */

function showPage(page){

let pages=[
"homePage",
"loginPage",
"profilePage",
"habitsPage",
"journalPage",
"traitsPage",
"reminderPage",
"moodPage"
]

pages.forEach(p=>{
document.getElementById(p).classList.add("hidden")
})

document.getElementById(page).classList.remove("hidden")

updateStats()

}


/* SIGNUP */

function signup(){

localStorage.setItem("email",email.value)
localStorage.setItem("password",password.value)

alert("Account created")

}


/* LOGIN */

function login(){

if(
email.value===localStorage.getItem("email") &&
password.value===localStorage.getItem("password")
){

unlockMenu()

showPage("homePage")

}

}


/* PROFILE */

function createProfile(){

let name=username.value
let file=profilePicInput.files[0]

let reader=new FileReader()

reader.onload=function(){

localStorage.setItem("username",name)
localStorage.setItem("profilePic",reader.result)

displayPic.src=reader.result

unlockMenu()

showPage("homePage")

}

reader.readAsDataURL(file)

}


/* UNLOCK FEATURES */

function unlockMenu(){

habitsBtn.disabled=false
journalBtn.disabled=false
traitsBtn.disabled=false
reminderBtn.disabled=false
moodBtn.disabled=false

}


/* HABITS */

let habits=JSON.parse(localStorage.getItem("habits"))||[]

function addHabit(){

let habit=habitInput.value

habits.push({name:habit,done:false})

localStorage.setItem("habits",JSON.stringify(habits))

renderHabits()

}

function toggleHabit(index){

habits[index].done=!habits[index].done

localStorage.setItem("habits",JSON.stringify(habits))

renderHabits()

}

function renderHabits(){

habitList.innerHTML=""

habits.forEach((h,i)=>{

let li=document.createElement("li")

li.innerHTML=`<input type="checkbox" ${h.done?"checked":""}
onclick="toggleHabit(${i})"> ${h.name}`

habitList.appendChild(li)

})

}


/* JOURNAL */

let journal=JSON.parse(localStorage.getItem("journal"))||[]

function saveJournal(){

let entry={
text:journalText.value,
date:new Date().toLocaleDateString()
}

journal.push(entry)

localStorage.setItem("journal",JSON.stringify(journal))

renderJournal()

}

function renderJournal(){

journalList.innerHTML=""

journal.forEach(j=>{

let li=document.createElement("li")

li.textContent=j.date+" : "+j.text

journalList.appendChild(li)

})

}


/* CHARACTER TRAITS */

let goodTraitsData=JSON.parse(localStorage.getItem("goodTraits"))||[]
let badTraitsData=JSON.parse(localStorage.getItem("badTraits"))||[]

function addTrait(){

let trait=traitInput.value

if(traitType.value==="good")
goodTraitsData.push(trait)
else
badTraitsData.push(trait)

localStorage.setItem("goodTraits",JSON.stringify(goodTraitsData))
localStorage.setItem("badTraits",JSON.stringify(badTraitsData))

renderTraits()

}

function renderTraits(){

goodTraits.innerHTML=""
badTraits.innerHTML=""

goodTraitsData.forEach(t=>{
let li=document.createElement("li")
li.textContent=t
goodTraits.appendChild(li)
})

badTraitsData.forEach(t=>{
let li=document.createElement("li")
li.textContent=t
badTraits.appendChild(li)
})

}


/* REMINDERS */

let reminders=JSON.parse(localStorage.getItem("reminders"))||[]

function addReminder(){

reminders.push(reminderInput.value)

localStorage.setItem("reminders",JSON.stringify(reminders))

renderReminders()

}

function renderReminders(){

reminderList.innerHTML=""

reminders.forEach(r=>{
let li=document.createElement("li")
li.textContent=r
reminderList.appendChild(li)
})

}


/* MOOD */

let moods=JSON.parse(localStorage.getItem("moods"))||[]

function saveMood(){

let entry={
mood:moodSelect.value,
date:new Date().toLocaleDateString()
}

moods.push(entry)

localStorage.setItem("moods",JSON.stringify(moods))

renderMood()

}

function renderMood(){

moodList.innerHTML=""

moods.forEach(m=>{
let li=document.createElement("li")
li.textContent=m.date+" : "+m.mood
moodList.appendChild(li)
})

}


/* DASHBOARD */

function updateStats(){

let usernameStored=localStorage.getItem("username") || ""

welcomeMsg.textContent="Welcome back "+usernameStored

habitStat.textContent="Habits: "+habits.length
journalStat.textContent="Journal entries: "+journal.length
moodStat.textContent="Mood logs: "+moods.length

}


/* LOAD DATA */

window.onload=function(){

if(localStorage.getItem("profilePic"))
displayPic.src=localStorage.getItem("profilePic")

renderHabits()
renderJournal()
renderTraits()
renderReminders()
renderMood()
updateStats()

}

</script>

</body>
</html>
```
