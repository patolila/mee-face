<!DOCTYPE html>
<html>
<head>
<title>Face Me</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}
header{
  text-align:center;
  font-size:40px;
  padding:20px;
}
.container{
  display:flex;
  height:90vh;
}
.menu{
  width:220px;
  background:#1f1f1f;
  padding-top:30px;
  text-align:center;
}
.menu button{
  display:block;
  width:85%;
  margin:10px auto;
  padding:12px;
  border:none;
  background:#00bfff;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
.menu button:disabled{
  background:#555;
}
.content{
  flex:1;
  padding:40px;
  text-align:center;
  overflow-y:auto;
}
.hidden{display:none;}
.pictureBox{
  width:200px;
  height:200px;
  border:3px dashed gray;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:center;
}
.profilePic{
  width:90px;
  height:90px;
  border-radius:50%;
  object-fit:cover;
  position:absolute;
  top:20px;
  left:20px;
  border:2px solid white;
}
input, select, textarea{
  padding:10px;
  margin:10px;
  width:250px;
}
textarea{
  resize:none;
  height:60px;
}
ul{list-style:none;padding-left:0;}
li{margin:5px 0;}
button.smallBtn{padding:5px 8px;margin-left:5px;}
</style>
</head>
<body>

<header>FACE ME</header>
<img id="displayPic" class="profilePic">

<div class="container">
<div class="menu">
  <button onclick="show('loginPage')">Sign Up / Login</button>
  <button onclick="show('profilePage')">Create Profile</button>
  <button id="opt2" disabled onclick="show('habitsPage')">Habits</button>
  <button id="opt3" disabled onclick="show('characterPage')">Character</button>
  <button onclick="show('home')">Back</button>
</div>

<div class="content">

<!-- Home Page -->
<div id="home">
  <div class="pictureBox">
    <img id="homePic" style="max-width:100%;max-height:100%">
  </div>
  <br>
  <input type="file" id="homePicInput" onchange="previewPic()">
</div>

<!-- Login Page -->
<div id="loginPage" class="hidden">
  <h2>Login / Sign Up</h2>
  <input id="loginEmail" placeholder="Email"><br>
  <input id="loginPass" type="password" placeholder="Password"><br>
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Log In</button>
</div>

<!-- Dashboard -->
<div id="dashboard" class="hidden">
  <h2>Welcome Back</h2>
  <p>Your personal dashboard is ready.</p>
</div>

<!-- Profile Page -->
<div id="profilePage" class="hidden">
  <h2>Create Profile</h2>
  <input id="username" placeholder="Username"><br>
  <input type="file" id="profilePicInput"><br>
  <button onclick="createProfile()">Create Profile</button>
</div>

<!-- Habits Page -->
<div id="habitsPage" class="hidden">
  <h2>Habits Tracker</h2>
  <input id="habitInput" placeholder="Add habit"><button onclick="addHabit()">Add</button>
  <ul id="habitList"></ul>
</div>

<!-- Character Page -->
<div id="characterPage" class="hidden">
  <h2>Character Tracker</h2>
  <input id="traitInput" placeholder="Add new trait">
  <select id="traitType">
    <option value="good">Good</option>
    <option value="bad">Bad</option>
  </select>
  <button onclick="addTrait()">Add Trait</button><br><br>
  <button onclick="showTraitLog()">Log Today's Traits</button>
  <h3>Good Traits:</h3>
  <ul id="goodTraits"></ul>
  <h3>Bad Traits:</h3>
  <ul id="badTraits"></ul>
</div>

<!-- Trait Log Section -->
<div id="traitLogSection" class="hidden">
  <h2>Daily Trait Log</h2>
  <input type="date" id="activityDatePicker"><br><br>
  <div style="display:flex; justify-content:space-around;">
    <div>
      <h3>Good Traits</h3>
      <div id="goodTraitBox"></div>
    </div>
    <div>
      <h3>Bad Traits</h3>
      <div id="badTraitBox"></div>
    </div>
  </div>
  <br>
  <textarea id="actionInput" placeholder="Write what you did"></textarea><br>
  <button onclick="saveTraitsEntries()">Save</button>
  <button onclick="backFromTraitLog()">Back</button><br><br>
  <select id="selectTraitDisplay"></select>
  <ul id="traitEntryList"></ul>
</div>

</div>
</div>

<script>
/* ------------------- Navigation ------------------- */
function show(page){
  let pages=["home","loginPage","dashboard","profilePage","habitsPage","characterPage","traitLogSection"];
  pages.forEach(p=>document.getElementById(p).classList.add("hidden"));
  document.getElementById(page).classList.remove("hidden");
}

/* ------------------- Sign Up/Login ------------------- */
function signup(){
  let email=document.getElementById("loginEmail").value;
  let pass=document.getElementById("loginPass").value;
  if(!email||!pass){alert("Enter email and password"); return;}
  localStorage.setItem("face_email",email);
  localStorage.setItem("face_pass",pass);
  alert("Account created. You can now log in.");
}
function login(){
  let email=document.getElementById("loginEmail").value;
  let pass=document.getElementById("loginPass").value;
  let savedEmail=localStorage.getItem("face_email");
  let savedPass=localStorage.getItem("face_pass");
  if(email===savedEmail && pass===savedPass){
    show("dashboard");
    renderHabits();
    renderTraits();
  }else{alert("Incorrect email or password");}
}
function autoFill(){
  let savedEmail=localStorage.getItem("face_email");
  let savedPass=localStorage.getItem("face_pass");
  if(savedEmail) document.getElementById("loginEmail").value=savedEmail;
  if(savedPass) document.getElementById("loginPass").value=savedPass;
}

/* ------------------- Profile ------------------- */
function createProfile(){
  let username=document.getElementById("username").value;
  let file=document.getElementById("profilePicInput").files[0];
  if(!username||!file){alert("Enter username and picture"); return;}
  let reader=new FileReader();
  reader.onload=function(){
    localStorage.setItem("face_username",username);
    localStorage.setItem("face_pic",reader.result);
    document.getElementById("displayPic").src=reader.result;
    unlockOptions();
    alert("Profile created");
    show("dashboard");
  }
  reader.readAsDataURL(file);
}
function unlockOptions(){
  document.getElementById("opt2").disabled=false;
  document.getElementById("opt3").disabled=false;
}

/* ------------------- Home Picture ------------------- */
function previewPic(){
  let file=document.getElementById("homePicInput").files[0];
  let reader=new FileReader();
  reader.onload=function(){document.getElementById("homePic").src=reader.result;}
  reader.readAsDataURL(file);
}

/* ------------------- Habits Tracker ------------------- */
let habits=JSON.parse(localStorage.getItem("habits"))||[];
function renderHabits(){
  const list=document.getElementById("habitList");
  list.innerHTML='';
  habits.forEach((habit,i)=>{
    const li=document.createElement("li");
    li.style.display="flex"; li.style.justifyContent="space-between"; li.style.margin="5px 0";
    li.innerHTML=`<span style="text-decoration:${habit.done?'line-through':'none'}">${habit.name}</span>
    <div>
      <button onclick="toggleHabit(${i})"> ${habit.done?'Undo':'Done'} </button>
      <button onclick="deleteHabit(${i})">X</button>
    </div>`;
    list.appendChild(li);
  });
}
function addHabit(){
  const input=document.getElementById("habitInput").value.trim();
  if(!input) return;
  habits.push({name:input,done:false});
  document.getElementById("habitInput").value='';
  localStorage.setItem("habits",JSON.stringify(habits));
  renderHabits();
}
function toggleHabit(i){habits[i].done=!habits[i].done; localStorage.setItem("habits",JSON.stringify(habits)); renderHabits();}
function deleteHabit(i){habits.splice(i,1); localStorage.setItem("habits",JSON.stringify(habits)); renderHabits();}

/* ------------------- Character Traits ------------------- */
let goodTraits=JSON.parse(localStorage.getItem("goodTraits"))||[];
let badTraits=JSON.parse(localStorage.getItem("badTraits"))||[];
function renderTraits(){
  const goodList=document.getElementById("goodTraits");
  const badList=document.getElementById("badTraits");
  goodList.innerHTML=''; badList.innerHTML='';
  goodTraits.forEach(t=>{let li=document.createElement("li"); li.textContent=t; goodList.appendChild(li);});
  badTraits.forEach(t=>{let li=document.createElement("li"); li.textContent=t; badList.appendChild(li);});
}
function addTrait(){
  const trait=document.getElementById("traitInput").value.trim();
  const type=document.getElementById("traitType").value;
  if(!trait) return alert("Type a trait first!");
  if(type==="good" && !goodTraits.includes(trait)) goodTraits.push(trait);
  if(type==="bad" && !badTraits.includes(trait)) badTraits.push(trait);
  document.getElementById("traitInput").value='';
  localStorage.setItem("goodTraits",JSON.stringify(goodTraits));
  localStorage.setItem("badTraits",JSON.stringify(badTraits));
  renderTraits();
}

/* ------------------- Daily Trait Logs ------------------- */
let dailyTraits=JSON.parse(localStorage.getItem("dailyTraits"))||{};
function showTraitLog(){
  document.getElementById("characterPage").classList.add("hidden");
  document.getElementById("traitLogSection").classList.remove("hidden");
  renderTraitCheckboxes();
  populateTraitSelect();
}
function renderTraitCheckboxes(){
  const goodBox=document.getElementById("goodTraitBox");
  const badBox=document.getElementById("badTraitBox");
  goodBox.innerHTML=''; badBox.innerHTML='';
  goodTraits.forEach(t=>{let l=document.createElement("label"); let cb=document.createElement("input"); cb.type="checkbox"; cb.value=t; l.appendChild(cb); l.append(` ${t}`); goodBox.appendChild(l); goodBox.appendChild(document.createElement("br"));});
  badTraits.forEach(t=>{let l=document.createElement("label"); let cb=document.createElement("input"); cb.type="checkbox"; cb.value=t; l.appendChild(cb); l.append(` ${t}`); badBox.appendChild(l); badBox.appendChild(document.createElement("br"));});
}
function saveTraitsEntries(){
  const date=document.getElementById("activityDatePicker").value;
  const action=document.getElementById("actionInput").value.trim();
  if(!date) return alert("Select a date");
  if(!action) return alert("Write what you did");
  if(!dailyTraits[date]) dailyTraits[date]={};
  const checked=[];
  document.querySelectorAll("#goodTraitBox input:checked, #badTraitBox input:checked").forEach(cb=>checked.push(cb.value));
  if(checked.length===0) return alert("Tick at least one trait");
  checked.forEach(trait=>{if(!dailyTraits[date][trait]) dailyTraits[date][trait]=[]; dailyTraits[date][trait].push(action);});
  localStorage.setItem("dailyTraits",JSON.stringify(dailyTraits));
  alert("Saved!");
  document.getElementById("actionInput").value='';
  renderTraitEntries();
}
function populateTraitSelect(){
  const sel=document.getElementById("selectTraitDisplay");
  sel.innerHTML='';
  goodTraits.concat(badTraits).forEach(t=>{let opt=document.createElement("option"); opt.value=t; opt.textContent=t; sel.appendChild(opt);});
  renderTraitEntries();
}
function renderTraitEntries(){
  const date=document.getElementById("activityDatePicker").value;
  const sel=document.getElementById("selectTraitDisplay");
  const list=document.getElementById("traitEntryList");
  if(!list || !date || !sel.value) return;
  list.innerHTML='';
  const trait=sel.value;
  if(!dailyTraits[date] || !dailyTraits[date][trait]) return;
  dailyTraits[date][trait].forEach((e,i)=>{let li=document.createElement("li"); li.textContent=`${i+1}. ${e}`; list.appendChild(li);});
}
function backFromTraitLog(){
  document.getElementById("traitLogSection").classList.add("hidden");
  document.getElementById("characterPage").classList.remove("hidden");
}

/* ------------------- On Load ------------------- */
window.onload=function(){
  autoFill();
  const pic=localStorage.getItem("face_pic");
  if(pic) document.getElementById("displayPic").src=pic;
  renderHabits(); renderTraits();
}
</script>

</body>
</html>
