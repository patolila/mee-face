<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaceMe+</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
transition:.3s;
}

.light{
background:#f5f5f5;
color:#111;
}

/* toggle */
#themeToggle{
position:fixed;
top:10px;
right:10px;
cursor:pointer;
}

/* PIN LOCK */
#lock{
position:fixed;
inset:0;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:10;
}

/* rest same style simplified */
.section{display:none;padding:20px}
.entry{background:#222;padding:10px;margin:10px;border-radius:8px}
button{padding:8px 15px;margin:5px;border:none;border-radius:6px;cursor:pointer}

</style>
</head>

<body>

<div id="themeToggle">🌗</div>

<!-- LOCK -->
<div id="lock">
<h2>Enter PIN</h2>
<input id="pinInput" type="password">
<button onclick="checkPin()">Enter</button>
</div>

<!-- COVER -->
<div id="cover">
<h2>FaceMe+</h2>
<button onclick="startApp()">Start</button>
</div>

<!-- MENU -->
<div id="menu" style="display:none">
<button onclick="openSection('habit')">Habit</button>
<button onclick="openSection('journal')">Journal</button>
<button onclick="openSection('mood')">Mood</button>
</div>

<!-- HABIT -->
<div id="habit" class="section">
<h3>Habits</h3>
<input id="habitInput">
<button onclick="saveHabit()">Save</button>
<div id="habitList"></div>
</div>

<!-- JOURNAL -->
<div id="journal" class="section">
<h3>Journal</h3>
<input id="search" placeholder="Search..." oninput="loadJournal()">
<textarea id="journalText"></textarea>
<button onclick="saveJournal()">Save</button>
<div id="journalList"></div>
</div>

<!-- MOOD -->
<div id="mood" class="section">
<h3>Mood</h3>
<select id="moodSelect">
<option>Happy</option>
<option>Sad</option>
</select>
<button onclick="saveMood()">Save</button>
<div id="moodStats"></div>
</div>

<script>

/* PIN */
let savedPin=localStorage.getItem("pin")||"1234"

function checkPin(){
if(pinInput.value===savedPin){
lock.style.display="none"
}
}

/* theme */
themeToggle.onclick=()=>{
document.body.classList.toggle("light")
localStorage.setItem("theme",document.body.classList.contains("light"))
}
if(localStorage.getItem("theme")=="true"){
document.body.classList.add("light")
}

/* nav */
function startApp(){
cover.style.display="none"
menu.style.display="block"
}
function openSection(id){
document.querySelectorAll(".section").forEach(s=>s.style.display="none")
document.getElementById(id).style.display="block"
}

/* helpers */
function save(k,d){localStorage.setItem(k,JSON.stringify(d))}
function get(k){return JSON.parse(localStorage.getItem(k)||"[]")}

/* HABIT + STREAK */
function saveHabit(){
let d=get("habits")
d.push({text:habitInput.value,date:Date.now()})
save("habits",d)
loadHabits()
}
function loadHabits(){
habitList.innerHTML=""
let d=get("habits")
d.forEach((x,i)=>{
habitList.innerHTML+=`
<div class="entry">
${x.text}
<button onclick="deleteHabit(${i})">❌</button>
</div>`
})
}
function deleteHabit(i){
let d=get("habits")
d.splice(i,1)
save("habits",d)
loadHabits()
}

/* JOURNAL + SEARCH */
function saveJournal(){
let d=get("journal")
d.push(journalText.value)
save("journal",d)
journalText.value=""
loadJournal()
}
function loadJournal(){
journalList.innerHTML=""
let q=search.value.toLowerCase()
get("journal").forEach((x,i)=>{
if(x.toLowerCase().includes(q)){
journalList.innerHTML+=`
<div class="entry">
${x}
<button onclick="deleteJournal(${i})">❌</button>
</div>`
}
})
}
function deleteJournal(i){
let d=get("journal")
d.splice(i,1)
save("journal",d)
loadJournal()
}

/* MOOD STATS */
function saveMood(){
let d=get("moods")
d.push(moodSelect.value)
save("moods",d)
loadMood()
}
function loadMood(){
let d=get("moods")
let count={}
d.forEach(m=>count[m]=(count[m]||0)+1)
moodStats.innerHTML=""
for(let m in count){
moodStats.innerHTML+=`<div>${m}: ${count[m]}</div>`
}
}

/* load */
loadHabits()
loadJournal()
loadMood()

</script>

</body>
</html>
