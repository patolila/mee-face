<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaceMe Pro</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

/* BACKGROUND */
body{
margin:0;
font-family:Arial;
color:white;
background:url('https://images.unsplash.com/photo-1500530855697-b586d89ba3ee') no-repeat center/cover;
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
z-index:-1;
}

/* COVER */
#cover{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#start{
padding:15px 40px;
border:none;
border-radius:30px;
background:#4da6ff;
color:white;
font-size:18px;
cursor:pointer;
}

/* DASHBOARD */
#menu{
display:none;
padding:20px;
}

.stats{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

.card{
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:10px;
min-width:100px;
}

/* ICON GRID */
.icons{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(120px,1fr));
gap:15px;
margin-top:20px;
}

.icon{
padding:20px;
border-radius:15px;
background:rgba(255,255,255,0.1);
cursor:pointer;
}

.icon i{
font-size:40px;
margin-bottom:10px;
}

/* SECTION */
.section{display:none;padding:20px}

input,textarea,select{
width:90%;
padding:10px;
margin:10px;
border-radius:8px;
border:none;
}

.entry{
background:rgba(255,255,255,0.1);
margin:10px;
padding:10px;
border-radius:8px;
}

/* CHART */
.bar{
height:20px;
background:#4da6ff;
margin:5px;
}

</style>
</head>

<body>

<div class="overlay"></div>

<!-- COVER -->
<div id="cover">
<h1>FaceMe</h1>
<p id="prompt"></p>
<button id="start">Start</button>
</div>

<!-- MENU -->
<div id="menu">

<div class="stats">
<div class="card">Habits: <span id="hCount"></span></div>
<div class="card">Journals: <span id="jCount"></span></div>
<div class="card">Moods: <span id="mCount"></span></div>
</div>

<div class="icons">
<div class="icon" onclick="openSection('habit')"><i class="fas fa-dumbbell"></i><p>Habit</p></div>
<div class="icon" onclick="openSection('journal')"><i class="fas fa-book"></i><p>Journal</p></div>
<div class="icon" onclick="openSection('mood')"><i class="fas fa-brain"></i><p>Mood</p></div>
</div>

</div>

<!-- HABIT -->
<div id="habit" class="section">
<h2>Habits</h2>
<input id="habitInput">
<button onclick="saveHabit()">Save</button>
<div id="habitList"></div>
</div>

<!-- JOURNAL -->
<div id="journal" class="section">
<h2>Journal</h2>
<textarea id="journalText"></textarea>
<button onclick="saveJournal()">Save</button>
<div id="journalList"></div>
</div>

<!-- MOOD -->
<div id="mood" class="section">
<h2>Mood</h2>
<select id="moodSelect">
<option>Happy</option>
<option>Sad</option>
<option>Focused</option>
</select>
<button onclick="saveMood()">Save</button>

<h3>Stats</h3>
<div id="chart"></div>
</div>

<script>

/* PROMPT */
let prompts=[
"Be honest with yourself today",
"What are you avoiding?",
"What did you improve?"
]
prompt.innerText=prompts[Math.floor(Math.random()*prompts.length)]

/* NAV */
start.onclick=()=>{
cover.style.display="none"
menu.style.display="block"
updateStats()
}
function openSection(id){
menu.style.display="none"
document.getElementById(id).style.display="block"
}

/* STORAGE */
function save(k,d){localStorage.setItem(k,JSON.stringify(d))}
function get(k){return JSON.parse(localStorage.getItem(k)||"[]")}

/* HABIT + STREAK */
function saveHabit(){
let d=get("habits")
let today=new Date().toDateString()
d.push({text:habitInput.value,date:today})
save("habits",d)
loadHabits()
updateStats()
}
function loadHabits(){
habitList.innerHTML=""
get("habits").forEach(x=>{
habitList.innerHTML+=`<div class="entry">${x.text} (${x.date})</div>`
})
}

/* JOURNAL */
function saveJournal(){
let d=get("journal")
d.push(journalText.value)
save("journal",d)
journalText.value=""
loadJournal()
updateStats()
}
function loadJournal(){
journalList.innerHTML=""
get("journal").forEach(x=>{
journalList.innerHTML+=`<div class="entry">${x}</div>`
})
}

/* MOOD + CHART */
function saveMood(){
let d=get("moods")
d.push(moodSelect.value)
save("moods",d)
loadMood()
updateStats()
}
function loadMood(){
let d=get("moods")
let count={}
d.forEach(m=>count[m]=(count[m]||0)+1)

chart.innerHTML=""
for(let m in count){
chart.innerHTML+=`<div>${m}</div><div class="bar" style="width:${count[m]*30}px"></div>`
}
}

/* DASHBOARD */
function updateStats(){
hCount.innerText=get("habits").length
jCount.innerText=get("journal").length
mCount.innerText=get("moods").length
}

/* LOAD */
loadHabits()
loadJournal()
loadMood()

</script>

</body>
</html>
