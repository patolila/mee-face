<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Face Me - Interactive</title>
<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:rgba(0,0,0,0.3);
}
nav h1{
    margin:0;
    font-size:24px;
}
nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-size:16px;
}
nav a:hover{
    color:#38bdf8;
}
section{
    max-width:800px;
    margin:auto;
    padding:40px 20px;
}
.card{
    background:rgba(255,255,255,0.05);
    padding:25px;
    border-radius:10px;
    margin-top:20px;
}
textarea, input, select{
    width:100%;
    border:none;
    border-radius:6px;
    padding:10px;
    margin-top:10px;
}
button{
    margin-top:10px;
    padding:10px 18px;
    border:none;
    border-radius:6px;
    background:#38bdf8;
    color:white;
    cursor:pointer;
}
button:hover{
    background:#0ea5e9;
}
ul{
    list-style:none;
    padding-left:0;
}
li{
    margin-top:5px;
    background:rgba(255,255,255,0.1);
    padding:8px;
    border-radius:6px;
}
footer{
    text-align:center;
    padding:30px;
    opacity:0.6;
}
</style>
</head>
<body>

<nav>
<h1>Face Me</h1>
<div>
<a href="#mood">Mood</a>
<a href="#journal">Journal</a>
<a href="#reflection">Reflection</a>
</div>
</nav>

<section id="mood" class="card">
<h3>Mood Tracker</h3>
<button onclick="addMood()">Record Mood</button>
<ul id="moodList"></ul>
</section>

<section id="journal" class="card">
<h3>Journal</h3>
<input type="date" id="journalDate">
<textarea id="journalEntry" placeholder="Write your journal here..."></textarea>
<button onclick="saveJournal()">Save Entry</button>
<button onclick="loadJournal()">Load Entry</button>
</section>

<section id="reflection" class="card">
<h3>Today's Reflection</h3>
<textarea id="reflectionText" placeholder="Write about your actions today..."></textarea>
<label><input type="checkbox" id="goodTrait"> Practiced the trait</label><br>
<label><input type="checkbox" id="badTrait"> Failed today</label><br>
<button onclick="saveReflection()">Save Reflection</button>
<ul id="reflectionList"></ul>
</section>

<footer>
<p>Face Me • A space for growth and honesty</p>
</footer>

<script>
// Mood Tracker
function addMood(){
    let mood = prompt("How is your mood today?");
    if(mood){
        let reason = prompt("Why do you feel that way?");
        if(reason){
            let entry = {mood, reason, date: new Date().toLocaleString()};
            let moods = JSON.parse(localStorage.getItem('moods') || "[]");
            moods.push(entry);
            localStorage.setItem('moods', JSON.stringify(moods));
            renderMoods();
        }
    }
}

function renderMoods(){
    let list = document.getElementById('moodList');
    let moods = JSON.parse(localStorage.getItem('moods') || "[]");
    list.innerHTML = "";
    moods.forEach(m => {
        let li = document.createElement('li');
        li.textContent = `${m.date} — Mood: ${m.mood}, Reason: ${m.reason}`;
        list.appendChild(li);
    });
}
renderMoods();

// Journal
function saveJournal(){
    let date = document.getElementById('journalDate').value;
    let entry = document.getElementById('journalEntry').value;
    if(date && entry){
        localStorage.setItem('journal_' + date, entry);
        alert("Journal entry saved!");
    } else {
        alert("Select a date and write something first.");
    }
}

function loadJournal(){
    let date = document.getElementById('journalDate').value;
    if(!date) { alert("Pick a date."); return; }
    let entry = localStorage.getItem('journal_' + date);
    document.getElementById('journalEntry').value = entry || "";
    if(!entry) alert("No entry for this date.");
}

// Daily Reflection
function saveReflection(){
    let text = document.getElementById('reflectionText').value;
    let good = document.getElementById('goodTrait').checked;
    let bad = document.getElementById('badTrait').checked;
    if(!text && !good && !bad){ alert("Write or check at least one box."); return; }
    let reflections = JSON.parse(localStorage.getItem('reflections') || "[]");
    reflections.push({
        date: new Date().toLocaleString(),
        text,
        good,
        bad
    });
    localStorage.setItem('reflections', JSON.stringify(reflections));
    renderReflections();
}

function renderReflections(){
    let list = document.getElementById('reflectionList');
    let reflections = JSON.parse(localStorage.getItem('reflections') || "[]");
    list.innerHTML = "";
    reflections.forEach(r => {
        let li = document.createElement('li');
        li.textContent = `${r.date} — ${r.text} ${r.good ? "[Good]" : ""} ${r.bad ? "[Bad]" : ""}`;
        list.appendChild(li);
    });
}
renderReflections();
</script>

</body>
</html>
