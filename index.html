<!DOCTYPE html>
<html>
<head>
<title>Face Me</title>
<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}

.container{
max-width:500px;
margin:auto;
margin-top:100px;
background:#1e293b;
padding:30px;
border-radius:10px;
}

input,textarea{
width:90%;
padding:10px;
margin:10px;
border-radius:6px;
border:none;
}

button{
padding:10px 20px;
border:none;
background:#38bdf8;
color:white;
border-radius:6px;
cursor:pointer;
}

#home{
display:none;
}

</style>
</head>

<body>

<div id="login" class="container">

<h2>Face Me</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

</div>


<div id="home">

<h1>Welcome <span id="user"></span></h1>

<div class="container">

<h3>Create Your Profile</h3>

<input id="name" placeholder="Your Name">

<textarea id="bio" placeholder="Write about yourself"></textarea>

<button onclick="saveProfile()">Save Profile</button>

</div>

</div>

<script>

function signup(){
let u=document.getElementById("username").value
let p=document.getElementById("password").value

localStorage.setItem("username",u)
localStorage.setItem("password",p)

alert("Account created. Now login.")
}

function login(){

let u=document.getElementById("username").value
let p=document.getElementById("password").value

if(u==localStorage.getItem("username") && p==localStorage.getItem("password")){

localStorage.setItem("logged","yes")

showHome()

}
else{

alert("Wrong login")

}

}

function showHome(){

document.getElementById("login").style.display="none"
document.getElementById("home").style.display="block"

document.getElementById("user").innerText=localStorage.getItem("username")

}

function saveProfile(){

let name=document.getElementById("name").value
let bio=document.getElementById("bio").value

localStorage.setItem("name",name)
localStorage.setItem("bio",bio)

alert("Profile saved")

}

if(localStorage.getItem("logged")=="yes"){

showHome()

}

</script>

</body>
</html>
