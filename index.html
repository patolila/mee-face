<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaceMe</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

/* Cover */

#cover{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#profile{
width:160px;
height:160px;
border-radius:50%;
background:#222;
overflow:hidden;
border:4px solid #4da6ff;
margin-bottom:20px;
}

#profile img{
width:100%;
height:100%;
object-fit:cover;
}

#start{
padding:14px 30px;
background:#4da6ff;
border:none;
border-radius:8px;
font-size:18px;
color:white;
cursor:pointer;
animation:bounce 1s infinite alternate;
}

@keyframes bounce{
from{transform:translateY(0)}
to{transform:translateY(-8px)}
}

/* Icons */

#menu{
display:none;
padding:20px;
}

.icons{
display:flex;
overflow-x:auto;
gap:20px;
justify-content:center;
}

.icon{
background:#222;
padding:20px;
border-radius:15px;
min-width:100px;
cursor:pointer;
transition:.3s;
}

.icon:hover{
transform:scale(1.1);
}

/* Sections */

.section{
display:none;
padding:20px;
}

input,textarea,select{
width:90%;
padding:10px;
margin:10px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#4da6ff;
color:white;
cursor:pointer;
}

.back{
background:#ff4d4d;
}

/* entries */

.entry{
background:#222;
padding:10px;
margin:10px;
border-radius:8px;
}

</style>
</head>

<body>

<!-- COVER -->

<div id="cover">

<div id="profile">
<img id="profileImg">
</div>

<input type="file" id="picUpload">

<h2>FaceMe</h2>

<p>This space helps you track your habits, thoughts, and growth.</p>

<button id="start">Start Journey</button>

</div>


<!-- MENU -->

<div id="menu">

<div class="icons">

<div class="icon" onclick="openSection('habit')">Habit</div>

<div class="icon" onclick="openSection('journal')">Journal</div>

<div class="icon" onclick="openSection('mood')">Mood</div>

<div class="icon" onclick="openSection('character')">Character</div>

<div class="icon" onclick="openSection('reminder')">Reminder</div>

</div>

</div>


<!-- HABIT -->

<div id="habit" class="section">

<h2>Habit</h2>

<input id="habitInput" placeholder="Habit you want to adopt">

<button onclick="saveHabit()">Save</button>

<div id="habitList"></div>

<button class="back" onclick="goBack()">Back</button>

</div>


<!-- JOURNAL -->

<div id="journal" class="section">

<h2>Journal</h2>

<input type="date" id="journalDate">

<textarea id="journalText" placeholder="Write your journal"></textarea>

<button onclick="saveJournal()">Save</button>

<div id="journalList"></div>

<button class="back" onclick="goBack()">Back</button>

</div>


<!-- MOOD -->

<div id="mood" class="section">

<h2>Mood</h2>

<select id="moodSelect">
<option>Happy</option>
<option>Sad</option>
<option>Excited</option>
</select>

<textarea id="moodReason" placeholder="Why do you feel this way?"></textarea>

<button onclick="saveMood()">Save</button>

<div id="moodList"></div>

<button class="back" onclick="goBack()">Back</button>

</div>


<!-- CHARACTER -->

<div id="character" class="section">

<h2>Character Trait</h2>

<input id="traitInput" placeholder="Trait e.g Kindness">

<textarea id="traitExample" placeholder="Example of this trait"></textarea>

<button onclick="saveTrait()">Save</button>

<div id="traitList"></div>

<button class="back" onclick="goBack()">Back</button>

</div>


<!-- REMINDER -->

<div id="reminder" class="section">

<h2>Reminder</h2>

<input id="reminderInput" placeholder="Reminder">

<button onclick="saveReminder()">Save</button>

<div id="reminderList"></div>

<button class="back" onclick="goBack()">Back</button>

</div>



<script>

/* cover */

start.onclick=function(){
cover.style.display="none"
menu.style.display="block"
}

/* profile pic */

picUpload.onchange=function(e){

let reader=new FileReader()

reader.onload=function(){
profileImg.src=reader.result
localStorage.setItem("profile",reader.result)
}

reader.readAsDataURL(e.target.files[0])

}

profileImg.src=localStorage.getItem("profile")



/* navigation */

function openSection(name){

menu.style.display="none"

document.getElementById(name).style.display="block"

}

function goBack(){

let sections=document.querySelectorAll(".section")

sections.forEach(s=>s.style.display="none")

menu.style.display="block"

}



/* SAVE FUNCTIONS */

function saveHabit(){

let val=habitInput.value

let data=JSON.parse(localStorage.getItem("habits")||"[]")

data.push(val)

localStorage.setItem("habits",JSON.stringify(data))

habitInput.value=""

loadHabits()

}

function loadHabits(){

let data=JSON.parse(localStorage.getItem("habits")||"[]")

habitList.innerHTML=""

data.forEach(x=>{
habitList.innerHTML+=`<div class="entry">${x}</div>`
})

}



function saveJournal(){

let data=JSON.parse(localStorage.getItem("journals")||"[]")

data.push({
date:journalDate.value,
text:journalText.value
})

localStorage.setItem("journals",JSON.stringify(data))

journalText.value=""

loadJournal()

}

function loadJournal(){

let data=JSON.parse(localStorage.getItem("journals")||"[]")

journalList.innerHTML=""

data.forEach(x=>{
journalList.innerHTML+=`<div class="entry"><b>${x.date}</b><br>${x.text}</div>`
})

}



function saveMood(){

let data=JSON.parse(localStorage.getItem("moods")||"[]")

data.push({
mood:moodSelect.value,
reason:moodReason.value
})

localStorage.setItem("moods",JSON.stringify(data))

moodReason.value=""

loadMood()

}

function loadMood(){

let data=JSON.parse(localStorage.getItem("moods")||"[]")

moodList.innerHTML=""

data.forEach(x=>{
moodList.innerHTML+=`<div class="entry">${x.mood}<br>${x.reason}</div>`
})

}



function saveTrait(){

let data=JSON.parse(localStorage.getItem("traits")||"[]")

data.push({
trait:traitInput.value,
example:traitExample.value
})

localStorage.setItem("traits",JSON.stringify(data))

traitExample.value=""

loadTraits()

}

function loadTraits(){

let data=JSON.parse(localStorage.getItem("traits")||"[]")

traitList.innerHTML=""

data.forEach(x=>{
traitList.innerHTML+=`<div class="entry"><b>${x.trait}</b><br>${x.example}</div>`
})

}



function saveReminder(){

let data=JSON.parse(localStorage.getItem("reminders")||"[]")

data.push(reminderInput.value)

localStorage.setItem("reminders",JSON.stringify(data))

reminderInput.value=""

loadReminders()

}

function loadReminders(){

let data=JSON.parse(localStorage.getItem("reminders")||"[]")

reminderList.innerHTML=""

data.forEach(x=>{
reminderList.innerHTML+=`<div class="entry">${x}</div>`
})

}



/* load saved data */

loadHabits()
loadJournal()
loadMood()
loadTraits()
loadReminders()

</script>

</body>
  </html>
