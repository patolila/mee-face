<!DOCTYPE html>
<html>
<head>
<title>FaceMe</title>
<style>
body{
  font-family:Arial;
  margin:0;
  background:#0f172a;
  color:white;
  overflow-x:hidden;
}

header{
  text-align:center;
  padding:40px;
  font-size:40px;
  font-weight:bold;
  background:linear-gradient(90deg,#6366f1,#22c55e);
}

.container{
  padding:20px;
  max-width:900px;
  margin:auto;
}

button{
  padding:12px 20px;
  margin:5px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  font-size:16px;
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  transition: transform 0.3s;
}

button:hover{
  transform:scale(1.05);
}

.section{
  display:none;
  margin-top:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  margin-top:10px;
  border-radius:12px;
}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

textarea{
  height:100px;
}

.notification{
  position:fixed;
  top:20px;
  right:20px;
  background:red;
  width:18px;
  height:18px;
  border-radius:50%;
  display:none;
}

.reminder-popup{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  padding:15px;
  border-radius:10px;
  display:none;
}

.entry{
  background:#334155;
  padding:10px;
  border-radius:10px;
  margin-top:5px;
  cursor:pointer;
}

.cover{
  text-align:center;
  padding:60px 20px;
  font-size:28px;
  animation:fade 2s;
  position:relative;
  overflow:hidden;
}

.cover img{
  border-radius:50%;
  width:120px;
  height:120px;
  object-fit:cover;
  margin-top:20px;
  border:3px solid #22c55e;
}

.back-btn{
  background:#6366f1;
}

.icon{
  width:20px;
  height:20px;
  margin-right:8px;
  fill:white;
}

@keyframes fade{
  from{opacity:0}
  to{opacity:1}
}

/* Bouncing start button */
@keyframes bounce{
  0%,20%,50%,80%,100%{transform:translateY(0)}
  40%{transform:translateY(-15px)}
  60%{transform:translateY(-8px)}
}

/* Sparkle dots */
.sparkle{
  position:absolute;
  width:6px;
  height:6px;
  background:white;
  border-radius:50%;
  animation:float 5s linear infinite;
  opacity:0.7;
}

@keyframes float{
  0%{transform:translateY(0) translateX(0);}
  50%{transform:translateY(-80px) translateX(50px);}
  100%{transform:translateY(-160px) translateX(0);}
}
</style>
</head>
<body>

<div class="notification" id="notif"></div>
<div class="reminder-popup" id="popup">Reminder Saved</div>

<header>FaceMe</header>

<div class="cover" id="cover">
  <p>A safe place to grow, reflect and build yourself.</p>
  
  <input type="file" id="faceUpload" accept="image/*" style="margin:10px auto; display:block;">
  <img id="faceImg" src="" alt="" style="display:none;">

  <button id="startBtn" onclick="openSection('menu')">Start Journey</button>
</div>

<div class="container">

<div id="menu" class="section">

  <button onclick="openSection('habit')">
    <svg class="icon" viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm4 0h14v-2H7v2zM3 17h2v-2H3v2zm4 0h14v-2H7v2zM3 9h2V7H3v2zm4 0h14V7H7v2z"/></svg>Habit
  </button>
  <button onclick="openSection('journal')">
    <svg class="icon" viewBox="0 0 24 24"><path d="M3 3h18v2H3V3zm0 4h18v14H3V7zm2 2v10h14V9H5z"/></svg>Journal
  </button>
  <button onclick="openSection('character')">
    <svg class="icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4S14.21 4 12 4 8 5.79 8 8s1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>Character
  </button>
  <button onclick="openSection('reminder')">
    <svg class="icon" viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6V9c0-3.07-1.63-5.64-4.5-6.32V2h-3v.68C7.63 3.36 6 5.92 6 9v7l-2 2v1h16v-1l-2-2z"/></svg>Reminder
  </button>
  <button onclick="openSection('mood')">
    <svg class="icon" viewBox="0 0 24 24"><path d="M12 22c5.52 0 10-4.48 10-10S17.52 2 12 2 2 6.48 2 12s4.48 10 10 10zm-4-7h8v1H8v-1zm.5-4c.83 0 1.5.67 1.5 1.5S9.33 14 8.5 14 7 13.33 7 12.5 7.67 11 8.5 11zm7 0c.83 0 1.5.67 1.5 1.5S16.33 14 15.5 14 14 13.33 14 12.5 14.67 11 15.5 11z"/></svg>Mood
  </button>

</div>

<!-- HABIT -->
<div id="habit" class="section">
  <button class="back-btn" onclick="openSection('menu')">← Back</button>
  <h2>Habit Builder</h2>
  <input id="habitInput" placeholder="Enter habit you want to adopt">
  <button onclick="addHabit()">Add Habit</button>
  <div id="habitList"></div>
</div>

<!-- JOURNAL -->
<div id="journal" class="section">
  <button class="back-btn" onclick="openSection('menu')">← Back</button>
  <h2>Journal</h2>
  <textarea id="journalText" placeholder="Write your thoughts..."></textarea>
  <input id="journalName" placeholder="Save entry as (example: Day 1)">
  <button onclick="saveJournal()">Save</button>
  <div id="journalEntries"></div>
</div>

<!-- CHARACTER -->
<div id="character" class="section">
  <button class="back-btn" onclick="openSection('menu')">← Back</button>
  <h2>Character Traits</h2>
  <input id="traitName" placeholder="Trait (example: kindness)">
  <textarea id="traitStory" placeholder="Describe the moment you showed this trait"></textarea>
  <label><input type="checkbox" id="goodTrait"> Positive trait ✅</label>
  <button onclick="saveTrait()">Save Trait</button>
  <div id="traitList"></div>
</div>

<!-- REMINDER -->
<div id="reminder" class="section">
  <button class="back-btn" onclick="openSection('menu')">← Back</button>
  <h2>Reminder</h2>
  <input type="date" id="reminderDate">
  <input id="reminderText" placeholder="Reminder text">
  <button onclick="saveReminder()">Save Reminder</button>
  <div id="reminderList"></div>
</div>

<!-- MOOD -->
<div id="mood" class="section">
  <button class="back-btn" onclick="openSection('menu')">← Back</button>
  <h2>How is your mood?</h2>
  <button onclick="saveMood('Happy')">Happy</button>
  <button onclick="saveMood('Neutral')">Neutral</button>
  <button onclick="saveMood('Sad')">Sad</button>
  <div id="moodResult"></div>
</div>

<script>
function openSection(id){
  document.querySelectorAll(".section").forEach(s=>s.style.display="none")
  document.getElementById(id).style.display="block"
}

// Cover button animation
document.getElementById("startBtn").style.animation="bounce 2s infinite"

// Sparkles
for(let i=0;i<12;i++){
  let s=document.createElement("div")
  s.className="sparkle"
  s.style.left=Math.random()*100+"%"
  s.style.animationDuration=(3+Math.random()*4)+"s"
  document.getElementById("cover").appendChild(s)
}

// Profile picture upload
let faceUpload=document.getElementById("faceUpload")
let faceImg=document.getElementById("faceImg")
faceUpload.addEventListener("change", e=>{
  let reader=new FileReader()
  reader.onload=()=> {
    faceImg.src=reader.result
    faceImg.style.display="block"
    localStorage.setItem("face", reader.result)
  }
  reader.readAsDataURL(e.target.files[0])
})
// Load saved face
let savedFace=localStorage.getItem("face")
if(savedFace){faceImg.src=savedFace; faceImg.style.display="block"}

// HABIT
function addHabit(){
  let habit=document.getElementById("habitInput").value
  if(!habit) return alert("Type a habit first")
  let reflection=prompt("Why do you want this habit?")
  let data={habit,reflection}
  let habits=JSON.parse(localStorage.getItem("habits")||"[]")
  habits.push(data)
  localStorage.setItem("habits",JSON.stringify(habits))
  displayHabits()
}
function displayHabits(){
  let habits=JSON.parse(localStorage.getItem("habits")||"[]")
  let box=document.getElementById("habitList")
  box.innerHTML=""
  habits.forEach(h=>{
    let div=document.createElement("div")
    div.className="card"
    div.innerHTML="<b>"+h.habit+"</b><br>"+h.reflection
    box.appendChild(div)
  })
}
displayHabits()

// JOURNAL
function saveJournal(){
  let text=document.getElementById("journalText").value
  let name=document.getElementById("journalName").value
  if(!text || !name) return alert("Add both text and name")
  let entries=JSON.parse(localStorage.getItem("journals")||"[]")
  entries.push({name,text})
  localStorage.setItem("journals",JSON.stringify(entries))
  displayJournals()
}
function displayJournals(){
  let entries=JSON.parse(localStorage.getItem("journals")||"[]")
  let box=document.getElementById("journalEntries")
  box.innerHTML=""
  entries.forEach(e=>{
    let div=document.createElement("div")
    div.className="entry"
    div.innerText=e.name
    div.onclick=()=>alert(e.text)
    box.appendChild(div)
  })
}
displayJournals()

// CHARACTER
function saveTrait(){
  let name=document.getElementById("traitName").value
  let story=document.getElementById("traitStory").value
  let good=document.getElementById("goodTrait").checked
  if(!name || !story) return alert("Add both trait and story")
  let traits=JSON.parse(localStorage.getItem("traits")||"[]")
  traits.push({name,story,good})
  localStorage.setItem("traits",JSON.stringify(traits))
  displayTraits()
}
function displayTraits(){
  let traits=JSON.parse(localStorage.getItem("traits")||"[]")
  let box=document.getElementById("traitList")
  box.innerHTML=""
  traits.forEach(t=>{
    let div=document.createElement("div")
    div.className="entry"
    div.innerHTML=t.name + (t.good?" ✅":" ⚠️")
    div.onclick=()=>alert(t.story)
    box.appendChild(div)
  })
}
displayTraits()

// REMINDERS
function saveReminder(){
  let text=document.getElementById("reminderText").value
  let date=document.getElementById("reminderDate").value
  if(!text || !date) return alert("Add both date and text")
  let reminders=JSON.parse(localStorage.getItem("reminders")||"[]")
  reminders.push({text,date})
  localStorage.setItem("reminders",JSON.stringify(reminders))
  document.getElementById("notif").style.display="block"
  let popup=document.getElementById("popup")
  popup.style.display="block"
  setTimeout(()=>popup.style.display="none",2000)
  displayReminders()
}
function displayReminders(){
  let reminders=JSON.parse(localStorage.getItem("reminders")||"[]")
  let box=document.getElementById("reminderList")
  box.innerHTML=""
  reminders.forEach(r=>{
    let div=document.createElement("div")
    div.className="card"
    div.innerHTML=r.date+" - "+r.text
    box.appendChild(div)
  })
}
displayReminders()

// MOOD
function saveMood(mood){
  localStorage.setItem("mood",mood)
  document.getElementById("moodResult").innerText="Your mood: "+mood
}
</script>
</body>
</html>
