<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaceMe App</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    background: linear-gradient(to bottom, #f0f8ff, #a1c4fd);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
  }
  #cover, #menu, .section {
    width:100%;
    height:100%;
    position:absolute;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    transition:0.5s;
  }
  #cover.active, #menu.active, .section.active { z-index:1; }
  #profile-pic {
    width:120px;
    height:120px;
    border-radius:50%;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    margin-bottom:20px;
    border:3px solid #4a90e2;
  }
  #profile-pic img { width:100%; height:100%; object-fit:cover; }
  #start-btn {
    padding:15px 25px;
    font-size:18px;
    cursor:pointer;
    border:none;
    border-radius:10px;
    background:#4a90e2;
    color:#fff;
    transition:0.3s;
    animation: bounce 1s infinite alternate;
  }
  @keyframes bounce { 0%{transform:translateY(0);}100%{transform:translateY(-10px);} }
  .icons-container {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
  }
  .icon {
    width:120px;
    height:120px;
    background:#fff;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
    cursor:pointer;
    transition:0.3s;
  }
  .icon:hover { transform:scale(1.1); }
  .icon img { width:50px; height:50px; margin-bottom:10px; }
  .back-btn {
    margin-top:20px;
    padding:8px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#e74c3c;
    color:#fff;
  }
  input, textarea, select {
    padding:10px;
    margin:5px 0;
    border-radius:8px;
    border:1px solid #ccc;
    width:200px;
  }
  #save-btn {
    padding:10px 20px;
    margin-top:10px;
    border:none;
    border-radius:8px;
    background:#27ae60;
    color:#fff;
    cursor:pointer;
  }
  .notification {
    position:fixed;
    top:20px;
    right:20px;
    background:#e74c3c;
    color:#fff;
    padding:8px 15px;
    border-radius:10px;
    display:none;
  }
</style>
</head>
<body>

<div id="cover" class="active">
  <div id="profile-pic">
    <label for="profile-upload" style="cursor:pointer;width:100%;height:100%;display:flex;align-items:center;justify-content:center;">
      <span style="color:#4a90e2;">Upload</span>
    </label>
    <input type="file" id="profile-upload" style="display:none;">
  </div>
  <button id="start-btn">Start Your Journey</button>
</div>

<div id="menu">
  <div class="icons-container">
    <div class="icon" id="habit-icon"><img src="https://img.icons8.com/ios/50/000000/todo-list.png"/><span>Habit</span></div>
    <div class="icon" id="journal-icon"><img src="https://img.icons8.com/ios/50/000000/journal.png"/><span>Journal</span></div>
    <div class="icon" id="mood-icon"><img src="https://img.icons8.com/ios/50/000000/happy.png"/><span>Mood</span></div>
    <div class="icon" id="character-icon"><img src="https://img.icons8.com/ios/50/000000/positive-dynamic.png"/><span>Character</span></div>
    <div class="icon" id="reminder-icon"><img src="https://img.icons8.com/ios/50/000000/alarm.png"/><span>Reminder</span></div>
  </div>
</div>

<div id="habit-section" class="section">
  <h2>Add Habit</h2>
  <input type="text" id="habit-input" placeholder="Habit you want to adopt">
  <button id="habit-save" class="save-btn">Save Habit</button>
  <button class="back-btn">Back</button>
</div>

<div id="journal-section" class="section">
  <h2>Journal</h2>
  <input type="date" id="journal-date">
  <textarea id="journal-input" placeholder="Write your journal"></textarea>
  <input type="text" id="journal-title" placeholder="Save As (Title)">
  <button id="journal-save" class="save-btn">Save Journal</button>
  <button class="back-btn">Back</button>
</div>

<div id="mood-section" class="section">
  <h2>Mood</h2>
  <select id="mood-select">
    <option value="">Select Mood</option>
    <option value="Happy">Happy</option>
    <option value="Sad">Sad</option>
    <option value="Excited">Excited</option>
  </select>
  <textarea id="mood-reason" placeholder="Why do you feel this way?"></textarea>
  <button id="mood-save" class="save-btn">Save Mood</button>
  <button class="back-btn">Back</button>
</div>

<div id="character-section" class="section">
  <h2>Character Trait</h2>
  <select id="trait-select">
    <option value="">Select Trait</option>
    <option value="Kindness">Kindness</option>
    <option value="Patience">Patience</option>
    <option value="Honesty">Honesty</option>
  </select>
  <textarea id="trait-example" placeholder="Describe an instance of this trait"></textarea>
  <button id="trait-save" class="save-btn">Save Trait</button>
  <button class="back-btn">Back</button>
</div>

<div id="reminder-section" class="section">
  <h2>Reminder</h2>
  <input type="text" id="reminder-input" placeholder="Enter reminder">
  <button id="reminder-save" class="save-btn">Save Reminder</button>
  <button class="back-btn">Back</button>
</div>

<div class="notification" id="notif">Saved!</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, doc, setDoc, collection } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCdfjTsBr8jM01tyPeHqCD6IBhaBNWG4zs",
    authDomain: "facemeapp-da5fc.firebaseapp.com",
    projectId: "facemeapp-da5fc",
    storageBucket: "facemeapp-da5fc.firebasestorage.app",
    messagingSenderId: "496267641722",
    appId: "1:496267641722:web:e381a17b772739c8200cc3"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);

  // Elements
  const cover = document.getElementById("cover");
  const menu = document.getElementById("menu");
  const startBtn = document.getElementById("start-btn");
  const profileUpload = document.getElementById("profile-upload");
  const profilePic = document.getElementById("profile-pic");

  // Sections
  const sections = {
    habit: document.getElementById("habit-section"),
    journal: document.getElementById("journal-section"),
    mood: document.getElementById("mood-section"),
    character: document.getElementById("character-section"),
    reminder: document.getElementById("reminder-section")
  };

  const notif = document.getElementById("notif");

  startBtn.onclick = () => {
    cover.classList.remove("active");
    menu.classList.add("active");
  };

  function showSection(name){
    menu.classList.remove("active");
    for(let s in sections){ sections[s].classList.remove("active"); }
    sections[name].classList.add("active");
  }

  document.getElementById("habit-icon").onclick = ()=> showSection("habit");
  document.getElementById("journal-icon").onclick = ()=> showSection("journal");
  document.getElementById("mood-icon").onclick = ()=> showSection("mood");
  document.getElementById("character-icon").onclick = ()=> showSection("character");
  document.getElementById("reminder-icon").onclick = ()=> showSection("reminder");

  // Back buttons
  document.querySelectorAll(".back-btn").forEach(b=>{
    b.onclick = ()=>{
      for(let s in sections){ sections[s].classList.remove("active"); }
      menu.classList.add("active");
    };
  });

  function showNotif(){
    notif.style.display="block";
    setTimeout(()=>{ notif.style.display="none"; },1500);
  }

  // Habit save
  document.getElementById("habit-save").onclick = async ()=>{
    const val = document.getElementById("habit-input").value;
    if(!val) return;
    await setDoc(doc(collection(db,"habits")), {habit:val, timestamp:new Date()});
    document.getElementById("habit-input").value="";
    showNotif();
  };

  // Journal save
  document.getElementById("journal-save").onclick = async ()=>{
    const val = document.getElementById("journal-input").value;
    const date = document.getElementById("journal-date").value;
    const title = document.getElementById("journal-title").value || "Journal";
    if(!val || !date) return;
    await setDoc(doc(collection(db,"journals")), {title, content:val, date, timestamp:new Date()});
    document.getElementById("journal-input").value="";
    document.getElementById("journal-title").value="";
    document.getElementById("journal-date").value="";
    showNotif();
  };

  // Mood save
  document.getElementById("mood-save").onclick = async ()=>{
    const mood = document.getElementById("mood-select").value;
    const reason = document.getElementById("mood-reason").value;
    if(!mood) return;
    await setDoc(doc(collection(db,"moods")), {mood, reason, timestamp:new Date()});
    document.getElementById("mood-select").value="";
    document.getElementById("mood-reason").value="";
    showNotif();
  };

  // Character save
  document.getElementById("trait-save").onclick = async ()=>{
    const trait = document.getElementById("trait-select").value;
    const example = document.getElementById("trait-example").value;
    if(!trait) return;
    await setDoc(doc(collection(db,"traits")), {trait, example, timestamp:new Date()});
    document.getElementById("trait-select").value="";
    document.getElementById("trait-example").value="";
    showNotif();
  };

  // Reminder save
  document.getElementById("reminder-save").onclick = async ()=>{
    const val = document.getElementById("reminder-input").value;
    if(!val) return;
    await setDoc(doc(collection(db,"reminders")), {reminder:val, timestamp:new Date()});
    document.getElementById("reminder-input").value="";
    showNotif();
  };

  // Profile picture upload
  profileUpload.onchange = async (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    const storageRef = ref(storage,"profile/"+file.name);
    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);
    profilePic.innerHTML = `<img src="${url}"/>`;
  };

</script>

</body>
</html>
